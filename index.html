<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Concept Landing Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="glow-bg" id="glow"></div>

        <header>
            <div class="logo">Tesla</div>
            <div class="menu-icon">
                <span></span>
                <span></span>
            </div>
        </header>

        <div class="main-content">
            <div class="info-section" id="info-panel">
                <h1 id="car-name">Tesla Model X</h1>
                <p id="car-desc">Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident.</p>
                <a href="#" class="btn-reserve" id="btn-action">Reserve now</a>
            </div>

            <div class="image-section">
                <img src="https://i.ibb.co/v4b387g/model-x.png" alt="Tesla Car" id="car-img">
            </div>

            <div class="sidebar-menu">
                <div class="menu-item" onclick="changeCar(0, this)">Model S</div>
                <div class="menu-item active" onclick="changeCar(1, this)">Model X</div>
                <div class="menu-item" onclick="changeCar(2, this)">Model 3</div>
                <div class="menu-item" onclick="changeCar(3, this)">Roadster</div>
                <div class="menu-item" onclick="changeCar(4, this)">Semi Truck</div>
            </div>
        </div>

        <footer id="spec-panel">
            <div class="spec-box">
                <h2 id="spec-speed">+75<span>mph</span></h2>
                <p>Top Speed</p>
            </div>
            <div class="spec-box">
                <h2 id="spec-acc">3.1<span>s</span></h2>
                <p>0-60 mph</p>
            </div>
            <div class="spec-box">
                <h2 id="spec-range">520<span>mi</span></h2>
                <p>Mile Range</p>
            </div>
        </footer>

        <div class="scroll-icon"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
